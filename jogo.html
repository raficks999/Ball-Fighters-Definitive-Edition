<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ball Fighters</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>

        <h1>Ball Fighters: Definitive Edition</h1>

        <nav>
            <a href="index.html">Início</a>
            <a href="desenvolvedores.html">Desenvolvedores</a>
        </nav>
    </header>

    <main>

        <section class="card">

            <h2>Batalha de Bolas</h2>

            <h2>Seleção de Personagens</h2>

            <div class="select-area">

                <div class="personagem">
                    <h3>Bola Verde</h3>

                    <button onclick="selectP1('lime')">
                        P1
                    </button>

                    <button onclick="selectP2('lime')">
                        P2
                    </button>
                </div>

                <div class="personagem">
                    <h3>Bola Vermelha</h3>

                    <button onclick="selectP1('red')">
                        P1
                    </button>

                    <button onclick="selectP2('red')">
                        P2
                    </button>
                </div>

                <div class="personagem">
                    <h3>Bola Azul</h3>

                    <button onclick="selectP1('cyan')">
                        P1
                    </button>

                    <button onclick="selectP2('cyan')">
                        P2
                    </button>
                </div>

                <div class="personagem">
                    <h3>Bola Roxa</h3>

                    <button onclick="selectP1('purple')">
                        P1
                    </button>

                    <button onclick="selectP2('purple')">
                        P2
                    </button>
                </div>
                
            </div>

            <div class="modo-jogo">

                <button onclick="ativarCPU()">
                    Jogar vs CPU
                </button>

                <button onclick="ativarP2()">
                    2 jogadores
                </button>
            </div>

            <button id="startBtn">
                Iniciar Jogo
            </button>

            <div class="vidas">

                <p id="vida1">
                    Vida 1: 100
                </p>

                <p id="vida2">
                    Vida 2: 100
                </p>
            </div>

            <canvas id="gameCanvas" width="1000" height="500"></canvas>

            <div class="controles">

                <h3>Controles</h3>

                <p>Jogador 1 -> W A S D + ESPAÇO</p>

                <p>Jogador 2 -> SETAS + ENTER</p>

            </div>

        </section>

    </main>

    <script src="script.js"></script>
    
</body>
</html>
